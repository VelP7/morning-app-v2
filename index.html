<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Начало V2</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Начало">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FAFAFA">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
            -webkit-user-select: none;
            user-select: none; 
        }

        input {
            -webkit-user-select: text;
            user-select: text;
        }

        .fade-transition { transition: opacity 1s ease-in-out; }
        
        /* Усовершенствованное дыхание: Теплый рассвет */
        .breathe-circle { 
            animation: breathe 10s ease-in-out forwards; 
        }
        
        @keyframes breathe {
            0% { transform: scale(0.8); opacity: 0.15; box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.3); }
            40% { transform: scale(1.4); opacity: 0.85; box-shadow: 0 0 50px 25px rgba(251, 146, 60, 0.25); border-color: rgba(251, 146, 60, 0.8); }
            100% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); border-color: rgba(251, 191, 36, 0); }
        }

        input:focus { outline: none; box-shadow: none; }
        
        /* Светлая матовая кнопка */
        .glass-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(228, 228, 231, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="text-zinc-800 h-screen antialiased overflow-hidden selection:bg-amber-100">

    <div class="max-w-md mx-auto h-full px-6 relative">
        
        <div id="screen-breathing" class="absolute inset-0 flex flex-col items-center justify-center z-40 fade-transition bg-[#FAFAFA]">
            <div class="relative flex items-center justify-center">
                <div class="w-32 h-32 rounded-full border breathe-circle absolute"></div>
                <p id="breathing-text" class="text-sm font-medium text-zinc-500 z-10 transition-opacity duration-1000 tracking-widest uppercase">Вдох</p>
            </div>
        </div>

        <div id="screen-affirmation" class="absolute inset-0 flex flex-col justify-center px-6 z-30 opacity-0 pointer-events-none fade-transition bg-[#FAFAFA]">
            <div class="flex-grow flex flex-col items-center justify-center">
                <p id="daily-text-container" class="text-xl font-light leading-relaxed text-center text-zinc-800 w-full px-2 [text-wrap:balance]"></p>
            </div>
            
            <div class="pb-12 w-full opacity-0 fade-transition" id="btn-responsibility-container">
                <button onclick="goToAction()" class="w-full glass-btn hover:bg-zinc-50 text-zinc-600 font-medium tracking-wide py-4 rounded-lg transition-all text-sm uppercase">
                    Принимаю ответственность
                </button>
            </div>
        </div>

        <div id="screen-action" class="absolute inset-0 flex flex-col justify-center px-6 z-20 opacity-0 pointer-events-none fade-transition bg-[#FAFAFA]">
            <div class="flex-grow flex flex-col justify-center">
                <p id="action-prompt-text" class="text-lg font-medium mb-12 text-center text-zinc-500"></p>
                <input type="text" id="action-input" class="w-full bg-transparent border-b border-zinc-300 focus:border-zinc-500 text-2xl pb-3 text-center text-zinc-800 transition-colors placeholder-zinc-300" autocomplete="off">
            </div>
            <div class="pb-12 w-full">
                <button onclick="finishMorning()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-white font-medium py-4 rounded-lg transition-colors text-sm uppercase tracking-wide shadow-lg">
                    Начать день
                </button>
            </div>
        </div>

        <div id="screen-outro" class="absolute inset-0 flex flex-col items-center justify-center z-10 opacity-0 pointer-events-none fade-transition bg-[#FAFAFA]">
            <div id="outro-content" class="flex flex-col items-center fade-transition transition-opacity duration-1000">
                <p class="text-zinc-500 font-medium tracking-widest text-sm uppercase mb-8">Намерение принято</p>
                <div class="flex flex-col items-center">
                    <p class="text-4xl font-light text-zinc-800" id="streak-display">День 1</p>
                    <p class="text-xl font-light text-zinc-500 mt-2 tracking-wide">начался</p>
                </div>
            </div>
            <p id="final-whisper" class="absolute text-zinc-400 font-medium tracking-widest text-xs uppercase opacity-0 transition-opacity duration-1000">
                Отложи телефон
            </p>
        </div>

    </div>
