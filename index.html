<html lang="ru">
<head>

    <title>Начало V2</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Начало">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FAFAFA">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA; /* Светлый матовый фон (Алебастр) */
            -webkit-user-select: none;
            user-select: none; 
        }

        input {
            -webkit-user-select: text;
            user-select: text;
        }

        .fade-transition { transition: opacity 1s ease-in-out; }
        
        /* Усовершенствованное дыхание: Теплый рассвет (Peach/Rose gradient на пике) */
        .breathe-circle { 
            animation: breathe 10s ease-in-out forwards; 
        }
        
        @keyframes breathe {
            0% { 
                transform: scale(0.8); 
                opacity: 0.15; 
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.15); 
                border-color: rgba(251, 191, 36, 0.3); 
            }
            40% { 
                transform: scale(1.4); 
                opacity: 0.85; 
                box-shadow: 0 0 50px 25px rgba(251, 146, 60, 0.25); 
                border-color: rgba(251, 146, 60, 0.8); 
            }
            100% { 
                transform: scale(0.8); 
                opacity: 0; 
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); 
                border-color: rgba(251, 191, 36, 0); 
            }
        }

        input:focus { outline: none; box-shadow: none; }
        
        /* Светлая матовая кнопка (Стекло) */
        .glass-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(228, 228, 231, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

                <input type="text" id="action-input" placeholder="" class="w-full bg-transparent border-b border-zinc-300 focus:border-zinc-500 text-2xl pb-3 text-center text-zinc-800 transition-colors placeholder-zinc-300" autocomplete="off">
            </div>
            
            <div class="pb-12 w-full">
